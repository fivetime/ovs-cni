name: "Push images on release"

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to check out + image tag (e.g. v0.39.0). Empty = use the dispatched branch ref.'
        required: false
        default: ''
      platforms:
        description: 'Which platforms to build'
        required: false
        default: all
        type: choice
        options: [all, amd64, arm64, amd64+arm64]

concurrency:
  group: image-push-release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-plugin

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          set -euo pipefail
          all='[
            {"platform":"linux/amd64","arch":"amd64","runner":"X64","qemu":false},
            {"platform":"linux/arm64","arch":"arm64","runner":"X64","qemu":true},
            {"platform":"linux/ppc64le","arch":"ppc64le","runner":"X64","qemu":true},
            {"platform":"linux/s390x","arch":"s390x","runner":"X64","qemu":true}
          ]'
          p="${{ inputs.platforms }}"
          [[ -z "$p" ]] && p=all
          case "$p" in
            all)         m="$all" ;;
            amd64)       m=$(jq -c '[.[]|select(.arch=="amd64")]'                  <<<"$all") ;;
            arm64)       m=$(jq -c '[.[]|select(.arch=="arm64")]'                  <<<"$all") ;;
            amd64+arm64) m=$(jq -c '[.[]|select(.arch=="amd64" or .arch=="arm64")]' <<<"$all") ;;
            *) echo "::error::unknown platforms input: $p"; exit 1 ;;
          esac
          m=$(jq -c <<<"$m")
          echo "matrix=$m" >> "$GITHUB_OUTPUT"
          {
            echo "## Build plan"
            echo ""
            echo "| event | ${{ github.event_name }} |"
            echo "|---|---|"
            echo "| ref | ${{ github.ref }} |"
            echo "| inputs.tag | ${{ inputs.tag }} |"
            echo "| platforms | ${p} |"
            echo ""
            echo '```json'
            echo "$m"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: discover
    name: Build (${{ matrix.platform }})
    runs-on: [self-hosted, linux, "${{ matrix.runner }}"]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          # On dispatch with `tag`, check out that historical tag while
          # running the workflow definition from the dispatched ref (main).
          # On push events (`inputs.tag` empty), default to the pushed ref.
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare version file
        run: ./hack/get_version.sh > .version

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}

      - name: Build and push (by digest)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./cmd/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.arch }}
          # See provenance/sbom comment in image-push-main.yaml.
          provenance: false
          sbom: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          # See runner.temp comment in image-push-main.yaml.
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-release-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [discover, build]
    runs-on: [self-hosted, linux, X64]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-release-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
